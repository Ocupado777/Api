<header class="header-premium d-flex align-items-center justify-content-between">

    <div class="d-flex align-items-center gap-3">
        <img src="img/logo-t.png" alt="Logo" style="height: 38px;">
        <h4 class="m-0">TaskMaster</h4>
    </div>

    <div class="search-container d-flex align-items-center gap-2">
        <span>🔍</span>
        <input type="text" class="input-premium" placeholder="Buscar tareas...">
    </div>

    <div class="d-flex align-items-center gap-3 position-relative">

        <button class="btn-icon position-relative" id="btnNotificaciones">
            🔔
            <span id="badgeNotificaciones" class="badge-notificaciones d-none">0</span>
        </button>

        <button class="theme-btn-header" id="themeToggle">🌙</button>

        <div class="d-flex align-items-center gap-2">
            <span id="userName" class="subtitle">Usuario</span>
            <div id="userAvatar" class="avatar-premium">U</div>
        </div>

    </div>

</header>
