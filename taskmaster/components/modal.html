<div class="modal fade" id="modalTarea" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-premium">

            <div class="modal-header border-0">
                <h5 class="modal-title">Nueva tarea</h5>
                <button type="button" class="btn-close btn-icon" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <label class="form-label">Título</label>
                <input type="text" id="tareaTitulo" class="form-control mb-3">

                <label class="form-label">Descripción</label>
                <textarea id="tareaDescripcion" class="form-control mb-3"></textarea>

                <label class="form-label">Fecha</label>
                <input type="date" id="tareaFecha" class="form-control mb-3">

                <label class="form-label">Prioridad</label>
                <select id="tareaPrioridad" class="form-select mb-3">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>

            </div>

            <div class="modal-footer border-0">
                <button class="btn-premium" id="guardarTarea">Guardar</button>
            </div>

        </div>
    </div>
</div>
