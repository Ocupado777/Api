<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Proyectos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/proyectos.css">
</head>

<body>

    <div id="header"></div>
    <div id="sidebar"></div>

    <main class="content-premium fade-in">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="section-title">📁 Proyectos</h2>
                <p class="section-subtitle">Organiza tus tareas dentro de proyectos premium</p>
            </div>

            <button class="btn-premium btn-glow" data-bs-toggle="modal" data-bs-target="#modalProyecto">
                ➕ Nuevo proyecto
            </button>
        </div>

        <section class="dashboard-section">
            <div id="listaProyectos" class="dashboard-row"></div>
        </section>

    </main>

    <!-- Modal Proyecto -->
    <div class="modal fade" id="modalProyecto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-premium">

                <div class="modal-header border-0">
                    <h5 class="modal-title" id="modalProyectoTitulo">Nuevo proyecto</h5>
                    <button type="button" class="btn-close btn-icon" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="proyectoId">

                    <label class="form-label">Nombre del proyecto</label>
                    <input type="text" id="proyectoNombre" class="form-control mb-3">

                    <label class="form-label">Descripción</label>
                    <textarea id="proyectoDescripcion" class="form-control mb-3"></textarea>

                    <label class="form-label">Fecha límite</label>
                    <input type="date" id="proyectoFecha" class="form-control mb-3">

                    <label class="form-label">Prioridad del proyecto</label>
                    <select id="proyectoPrioridad" class="form-select mb-3">
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>

                </div>

                <div class="modal-footer border-0">
                    <button class="btn-premium" id="guardarProyecto">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Panel flotante -->
    <div id="panelNotificaciones">
        <h6 class="section-title">Notificaciones</h6>
        <div id="panelNotificacionesLista"></div>
        <button class="btn-premium mt-2 btn-glow" onclick="window.location.href='notificaciones.html'">
            Ver todas
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/componentLoader.js"></script>
    <script src="js/notificationsGlobal.js"></script>
    <script src="js/proyectos.js"></script>
    <script src="js/globalUser.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/configuracion.js"></script>

    <div id="toastContainer" class="toast-container"></div>

</body>
</html>
