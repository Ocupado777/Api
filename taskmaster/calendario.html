<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Calendario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/calendario.css">
</head>

<body>

    <div id="header"></div>
    <div id="sidebar"></div>

    <main class="content-premium fade-in">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="section-title">🗓 Calendario</h2>
                <p class="section-subtitle">Visualiza tus tareas por fecha</p>
            </div>

            <div class="d-flex gap-2">
                <button class="btn-premium" id="btnMesAnterior">⬅️</button>
                <button class="btn-premium" id="btnHoy">Hoy</button>
                <button class="btn-premium" id="btnMesSiguiente">➡️</button>
            </div>
        </div>

        <section class="dashboard-section">
            <h3 class="section-title" id="tituloMes"></h3>
            <div id="calendarioGrid" class="calendario-grid"></div>
        </section>

    </main>

    <!-- Modal: tareas del día -->
    <div class="modal fade" id="modalDia" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-premium">

                <div class="modal-header border-0">
                    <h5 class="modal-title" id="modalDiaTitulo">Tareas del día</h5>
                    <button type="button" class="btn-close btn-icon" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <ul id="listaTareasDia" class="lista-dashboard"></ul>
                </div>

            </div>
        </div>
    </div>

    <!-- Panel flotante -->
    <div id="panelNotificaciones">
        <h6 class="section-title">Notificaciones</h6>
        <div id="panelNotificacionesLista"></div>
        <button class="btn-premium mt-2 btn-glow" onclick="window.location.href='notificaciones.html'">
            Ver todas
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/componentLoader.js"></script>
    <script src="js/notificationsGlobal.js"></script>
    <script src="js/calendario.js"></script>
    <script src="js/globalUser.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/configuracion.js"></script>

    <div id="toastContainer" class="toast-container"></div>

</body>
</html>
