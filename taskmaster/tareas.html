    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TaskMaster - Tareas</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/tareas.css">
    </head>
    <body>

        <div id="header"></div>
        <div id="sidebar"></div>

        <main class="content-premium fade-in">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="section-title">📝 Tareas</h2>
                    <p class="section-subtitle">Gestiona todas tus tareas en un solo lugar</p>
                </div>

                <button class="btn-premium btn-glow" data-bs-toggle="modal" data-bs-target="#modalTarea">
                    ➕ Nueva tarea
                </button>
            </div>

            <section class="mb-4">
                <div class="card-premium">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">Estado</label>
                            <select id="filtroEstado" class="form-select">
                                <option value="todos">Todos</option>
                                <option value="pendiente">Pendientes</option>
                                <option value="completada">Completadas</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Prioridad</label>
                            <select id="filtroPrioridad" class="form-select">
                                <option value="todas">Todas</option>
                                <option value="baja">Baja</option>
                                <option value="media">Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Proyecto</label>
                            <select id="filtroProyecto" class="form-select">
                                <option value="todos">Todos</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Buscar</label>
                            <input type="text" id="filtroTexto" class="form-control" placeholder="Buscar por título...">
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="card-premium">
                    <h2 class="section-title">Listado de tareas</h2>
                    <div id="listaTareas"></div>
                </div>
            </section>

        </main>

        <div id="panelNotificaciones">
            <h6 class="section-title">Notificaciones</h6>
            <div id="panelNotificacionesLista"></div>
            <button class="btn-premium mt-2 btn-glow" onclick="window.location.href='notificaciones.html'">
                Ver todas
            </button>
        </div>

        <div class="modal fade" id="modalTarea" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-premium">

                    <div class="modal-header border-0">
                        <h5 class="modal-title" id="modalTareaTitulo">Nueva tarea</h5>
                        <button type="button" class="btn-close btn-icon" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <input type="hidden" id="tareaId">

                        <label class="form-label">Título</label>
                        <input type="text" id="tareaTitulo" class="form-control mb-3">

                        <label class="form-label">Descripción</label>
                        <textarea id="tareaDescripcion" class="form-control mb-3"></textarea>

                        <label class="form-label">Fecha</label>
                        <input type="date" id="tareaFecha" class="form-control mb-3">

                        <label class="form-label">Prioridad</label>
                        <select id="tareaPrioridad" class="form-select mb-3">
                            <option value="baja">Baja</option>
                            <option value="media">Media</option>
                            <option value="alta">Alta</option>
                        </select>

                        <label class="form-label">Proyecto</label>
                        <input type="text" id="tareaProyecto" class="form-control mb-3">

                        <div class="subtareas-container">
                            <h6>Subtareas</h6>
                            <div class="subtareas-input-row">
                                <input id="subtareaInput" class="form-control" placeholder="Escribe una subtarea...">
                                <button class="btn-premium" id="btnAgregarSubtarea">➕</button>
                            </div>
                            <ul id="subtareasListaModal" class="subtareas-modal-list"></ul>
                        </div>

                    </div>

                    <div class="modal-footer border-0">
                        <button class="btn-premium" id="guardarTarea">Guardar</button>
                    </div>

                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/theme.js"></script>
        <script src="js/componentLoader.js"></script>
        <script src="js/notificationsGlobal.js"></script>
        <script src="js/tareas.js"></script>
        <script src="js/globalUser.js"></script>
        <script src="js/perfil.js"></script>
        <script src="js/configuracion.js"></script>


        <div id="toastContainer" class="toast-container"></div>

    </body>
    </html>
