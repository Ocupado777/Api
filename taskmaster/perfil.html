<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
</head>

<body class="fade-soft">

    <div id="header"></div>
    <div id="sidebar"></div>

    <div class="sidebar-toggle-btn">☰</div>

    <main class="content-premium fade-in">

        <div class="mb-4">
            <h2 class="section-title">👤 Perfil</h2>
            <p class="section-subtitle">Personaliza tu experiencia en TaskMaster</p>
        </div>

        <section class="perfil-card">

            <div class="perfil-avatar-container">
                <div id="perfilAvatar" class="perfil-avatar">U</div>
                <button class="btn-premium btn-sm mt-2" id="btnCambiarColor">Cambiar color</button>
            </div>

            <div class="perfil-info">

                <label class="form-label">Nombre</label>
                <input type="text" id="perfilNombre" class="form-control mb-3">

                <label class="form-label">Frase personal</label>
                <input type="text" id="perfilFrase" class="form-control mb-3">

                <label class="form-label">Tema</label>
                <select id="perfilTema" class="form-select mb-3">
                    <option value="dark">Oscuro</option>
                    <option value="light">Claro</option>
                </select>

                <button class="btn-premium mt-2" id="btnGuardarPerfil">Guardar cambios</button>

                <button class="btn-danger mt-3 w-100" id="btnCerrarSesion">Cerrar sesión</button>

            </div>

        </section>

    </main>

    <div id="panelNotificaciones">
        <h6 class="section-title">Notificaciones</h6>
        <div id="panelNotificacionesLista"></div>
        <button class="btn-premium mt-2 pulse-glow" onclick="window.location.href='notificaciones.html'">
            Ver todas
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/componentLoader.js"></script>
    <script src="js/notificationsGlobal.js"></script>
    <script src="js/globalUser.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/auth.js"></script>

    <div id="toastContainer" class="toast-container"></div>

</body>
</html>
