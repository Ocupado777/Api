<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Iniciar sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body class="fade-soft">

    <div class="background-overlay"></div>

    <div class="auth-container">

        <div class="auth-card position-relative">

            <button id="themeToggle" class="theme-btn-header" style="position:absolute; top:12px; right:12px;">
                🌙
            </button>

            <div class="text-center mb-3">
                <img src="img/logo-t.png" width="80">
            </div>

            <h2 class="text-center auth-title">TaskMaster</h2>
            <p class="text-center auth-sub">Organiza tu día como un profesional</p>

            <form id="loginForm" class="mt-4">

                <label class="subtitle">Correo electrónico</label>
                <input type="email" id="email" class="form-control input-premium mb-3" placeholder="tu@correo.com" required>

                <label class="subtitle">Contraseña</label>
                <input type="password" id="password" class="form-control input-premium mb-3" placeholder="••••••••" required>

                <button type="submit" class="btn-premium mt-2">Iniciar sesión</button>
            </form>

            <p id="loginMessage" class="text-center mt-3 subtitle"></p>

            <p class="text-center mt-3 subtitle">
                ¿No tienes cuenta?
                <a href="register.html" style="color: var(--accent); font-weight:600;">Crear una cuenta</a>
            </p>

        </div>
    </div>

    <script src="js/theme.js"></script>
<script>
    esperarBotonTema();
</script>

    <script src="js/globalUser.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
